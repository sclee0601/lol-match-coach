services:
  - type: web
    name: lol-match-coach
    runtime: python
    buildCommand: |
      cd frontend && npm install && npx ng build --configuration production && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RIOT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_API_KEY
        sync: false
    healthCheckPath: /health
    plan: free
